name: CI/CD - Convalidaciones USIL

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: convalidaciones_test
          MYSQL_ROOT_PASSWORD: root
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, bcmath, gd, zip
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: convalidaciones_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: convalidaciones_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: convalidaciones_test
          DB_USERNAME: root
          DB_PASSWORD: root
          QUEUE_CONNECTION: sync

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build frontend
        run: npm ci && npm run build

  deploy-qa:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to QA
        run: echo "Desplegando a QA (configurar credenciales/secretos del entorno)."

  deploy-prod:
    needs: deploy-qa
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production       # requiere aprobación manual en GitHub Environments
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: echo "Desplegando a producción tras aprobación manual."
