# Despliegue de producción: Nginx + PHP-FPM + worker + MySQL 8 + Redis.
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: convalidaciones-usil:prod
    restart: unless-stopped
    env_file: .env
    depends_on: [mysql, redis]
    networks: [usilnet]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [usilnet]

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: convalidaciones-usil:prod
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=600
    depends_on: [mysql, redis]
    networks: [usilnet]

  scheduler:
    image: convalidaciones-usil:prod
    restart: unless-stopped
    env_file: .env
    entrypoint: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    depends_on: [app]
    networks: [usilnet]

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    networks: [usilnet]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [usilnet]

networks:
  usilnet:
    driver: bridge

volumes:
  mysqldata:
