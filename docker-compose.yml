# Entorno de desarrollo basado en Laravel Sail (Docker).
# Elegido por paridad dev/QA/prod y por escalabilidad (mismo MySQL 8 y Redis).
services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: convalidaciones-usil
    volumes:
      - .:/var/www/html
    ports:
      - "80:80"
    depends_on:
      - mysql
      - redis
    networks:
      - usilnet

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: convalidaciones_usil
      MYSQL_USER: usil
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - usilnet

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - usilnet

networks:
  usilnet:
    driver: bridge

volumes:
  mysqldata:
